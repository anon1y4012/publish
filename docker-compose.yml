services:
  publish:
    image: ghcr.io/anon1y4012/publish:latest
    container_name: publish
    environment:
      PUBLISH_PORT: "8765"
      PUBLISH_HOST: "0.0.0.0"
      # PUBLISH_INBOX is /inbox inside the container — controlled by the volume below
    volumes:
      - /Users/johnlaughlin/publish:/inbox
    ports:
      - 8765:8765
    restart: unless-stopped
